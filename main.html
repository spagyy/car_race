<!doctype html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Car RAce</title>
    <link rel="icon" href="icon.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Press+Start+2P">
</head>

    <style>
        body {
            background-color: rgba(103, 103, 103, 0.63);
            font-family: 'Press Start 2P', monospace;
            <!-- font-smooth: -->
            height: 98vh;
        }

        .topUI{
            position: absolute;
            z-index: 1000;
            transform: translate(-50%, 25px);
            text-shadow: -2px 0 black, 2px 0 black, 2px 0 black,-2px 0 black;
            letter-spacing: 2px;
            color: white;
            font-size: 17px;
        }
        .topUI::before{
            display: inline-block;
            height: 17px;
            padding: 1px 2px;
            line-height: 19px;
            font-size: 17px;
            background : white;
            text-shadow: none;
            font-weight: 900;
            letter-spacing: 0;
            border-radius: 6px;
            margin-right: 30px;
            border: 3px solid rgba(19, 225, 201, 0.92);
        }

        #time{
            left: 13%;
            color: goldenrod;
        }
        #time::before{
            content: "TIME";
            color: #f57214;
        }
        #score{
            left: 45%;
        }
        #score::before{
            content: "SCORE";
            color: #46149d;
        }
        #lap{
            left: 88%;
            width: 45%;
        }
        #lap::before{
            content: "LAP";
            color: #0082df;
        }

        #tacho{
            position: absolute;
            text-align: right;
            width: 23%;
            bottom: 5%;
            z-index: 2000;
            color: #e62e13;
            text-shadow: -2px 0 black, 2px 0 black, 2px 0 black,-2px 0 black;
            letter-spacing: 2px;
            font-size: 23px;
        }
        #tacho::after{
            content: "kh/h";
            color: #fab453;
            font-size: 18px;
            margin-left: 5px;
        }

        #game{
            position: relative;
            margin: 0 auto;
            overflow: hidden;
            background: #222;
            user-select: none;
            transition: opacity 10s;
        }
        #road{
            transition: opacity 2s;
            transition-timing-function: steps(8, end);
        }
        #road * {
            position: absolute;
            image-rendering: pixelated;
        }

        #hero {
            background-repeat: no-repeat;
            background-position: -100px 0 ;
            z-index: 2000;
            transform: scale(1,4);
        }

        #cloud {
            background-size: auto 100%;
            width: 100%;
            height: 57%;
        }

        #road{
            position: absolute;
            width: 100%;
            height: 100%;
        }
        #home{
            position: absolute;
            color: white;
            width: 100%;
            height: 100%;
            z-index: 1000;
        }
        #highscore{
            position: absolute;
            width: 100%;
            height: 20%;
            bottom: 0;
            column-count: 3;
            column-fill: auto;
        }
        #highscores * {
            color: #9e95q8
            margin: 0 0 6px 27px;
        }
        #
    </style>

<body translate="no">
    <div id="game">
        <div id="road">
            <div id="cloud"></div>
            <div id="hero"></div>
        </div>

    <div id="hud">
        <span id="time" class="topUI">0</span>
        <span id="score" class="topUI">0</span>
        <span id="lap" class="topUI">0'00"0000</span>
        <span id="tacho" class="topUI">0</span>
    </div>
    <div id="home">
        <h1>Dash</h1>
        <p id="text"></p>

        <div id="highscore"></div>
    </div>
</div>
<div id="controls">
    <span><span>C</span>insert coin</span>
    <span><span>M</span>mute</span>
    <span><span>&lt;</span><span>&gt;</span>move</span>
    <span><span>&lt;</span><span>&gt;</span>accelerate</span>
</div>

    <script src="javascript/1.js"></script>
    <script src="rendered-js"></script>
</body>
</html>
